services:
  app:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile
    container_name: campus-agent-app
    working_dir: /app
    command: ["go", "run", "./cmd/server"]
    ports:
      - "8080:8080"
    volumes:
      - ../:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile
    container_name: campus-agent-worker
    working_dir: /app
    command: ["go", "run", "./cmd/worker"]
    volumes:
      - ../:/app
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: campus-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campus_agent
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2
    container_name: campus-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: campus-agent-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
